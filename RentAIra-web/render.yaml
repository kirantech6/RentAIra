services:
  - type: web
    name: rentaira-backend
    env: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false # Set as an environment variable in the Render Dashboard directly!
